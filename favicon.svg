  <!-- Finger dividers (dark gaps across fist) -->
  <rect x="9" y="19.5" width="14" height="1" fill="#000" opacity="0.55"/>
  <rect x="9" y="22.5" width="14" height="1" fill="#000" opacity="0.55"/>
