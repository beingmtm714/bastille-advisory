<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Bastille Advisory — Logo Export</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    body { background: #111; color: #F5F0DC; font-family: 'DM Sans', sans-serif; font-weight: 300; padding: 48px; }
    h1 { font-family: 'Bebas Neue', sans-serif; font-size: 2rem; letter-spacing: 0.1em; color: #FF0066; margin-bottom: 8px; }
    p.note { font-size: 0.85rem; color: #666; margin-bottom: 56px; }
    .logo-section { margin-bottom: 64px; }
    .logo-section h2 { font-size: 0.65rem; font-weight: 600; letter-spacing: 0.2em; text-transform: uppercase; color: #555; margin-bottom: 20px; border-bottom: 1px solid #222; padding-bottom: 10px; }
    .logo-wrap { display: inline-block; background: #050505; border: 1px solid #222; }
    .logo-wrap img { display: block; }
    .btn-row { display: flex; gap: 12px; margin-top: 16px; flex-wrap: wrap; }
    button {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.62rem; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase;
      background: none; border: 1px solid #333; color: #aaa;
      padding: 8px 16px; cursor: pointer; transition: all 0.15s;
    }
    button:hover { border-color: #FF0066; color: #FF0066; }
    canvas { display: none; }
  </style>
</head>
<body>

<h1>Bastille Advisory — Logo Export</h1>
<p class="note">Click any button to download. Right-click an image to save directly.</p>

<!-- AVATAR / PROFILE PHOTO -->
<div class="logo-section">
  <h2>Avatar — Gmail, Slack, Twitter, LinkedIn &nbsp;·&nbsp; Square lockup</h2>
  <div class="logo-wrap">
    <img id="avatar-img" src="bastille-avatar-800.png" width="300" height="300" alt="Bastille Advisory Avatar">
  </div>
  <div class="btn-row">
    <button onclick="downloadImg('bastille-avatar-800.png', 'bastille-avatar-800')">↓ Download 800×800 PNG</button>
    <button onclick="downloadImg('bastille-avatar-500.png', 'bastille-avatar-500')">↓ Download 500×500 PNG</button>
    <button onclick="downloadImg('bastille-avatar-300.png', 'bastille-avatar-300')">↓ Download 300×300 PNG (LinkedIn)</button>
  </div>
</div>

<!-- FULL RES LOGO -->
<div class="logo-section">
  <h2>Full Resolution Master &nbsp;·&nbsp; Print, decks, high-res use</h2>
  <div class="logo-wrap">
    <img src="bastille-logo.png" width="300" height="300" alt="Bastille Advisory Logo">
  </div>
  <div class="btn-row">
    <button onclick="downloadImg('bastille-logo.png', 'bastille-logo-master')">↓ Download Master PNG</button>
    <button onclick="downloadImg('bastille-torch.png', 'bastille-torch-original')">↓ Download Original (transparent BG)</button>
  </div>
</div>

<!-- FAVICON SIZES -->
<div class="logo-section">
  <h2>Favicon &amp; App Icon Sizes</h2>
  <div style="display:flex; gap:24px; align-items:flex-end; flex-wrap:wrap;">
    <div>
      <p style="font-size:0.6rem;color:#555;letter-spacing:0.15em;text-transform:uppercase;margin-bottom:8px">180px — Apple Touch</p>
      <div class="logo-wrap"><img src="apple-touch-icon.png" width="90" height="90"></div>
    </div>
    <div>
      <p style="font-size:0.6rem;color:#555;letter-spacing:0.15em;text-transform:uppercase;margin-bottom:8px">32px — Browser Tab</p>
      <div class="logo-wrap"><img src="favicon-32.png" width="32" height="32" style="image-rendering:pixelated"></div>
    </div>
  </div>
  <div class="btn-row" style="margin-top:20px">
    <button onclick="downloadImg('favicon.png', 'favicon')">↓ favicon.png</button>
    <button onclick="downloadImg('favicon-32.png', 'favicon-32')">↓ favicon-32.png</button>
    <button onclick="downloadImg('apple-touch-icon.png', 'apple-touch-icon')">↓ apple-touch-icon.png</button>
  </div>
</div>

<canvas id="export-canvas"></canvas>

<script>
function downloadImg(src, filename) {
  const a = document.createElement('a');
  a.href = src;
  a.download = filename + '.png';
  a.click();
}
</script>
</body>
</html>
