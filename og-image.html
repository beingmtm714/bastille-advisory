<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1200">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1200px;
      height: 630px;
      overflow: hidden;
      background: #050505;
      font-family: 'DM Sans', sans-serif;
    }

    /* Nav */
    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 52px;
      height: 72px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      position: relative;
    }
    nav::after {
      content: '';
      position: absolute;
      bottom: -1px;
      left: 0;
      width: 100%;
      height: 2px;
      background: #FF0066;
      opacity: 0.6;
    }
    .nav-brand {
      display: flex;
      align-items: baseline;
      gap: 10px;
    }
    .nav-brand-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.7rem;
      letter-spacing: 0.12em;
      color: #F5F0DC;
    }
    .nav-brand-sub {
      font-size: 0.6rem;
      font-weight: 600;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #FF0066;
      opacity: 0.8;
    }
    .nav-links {
      display: flex;
      gap: 36px;
      list-style: none;
    }
    .nav-links li a {
      font-size: 0.62rem;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(245,240,220,0.5);
      text-decoration: none;
    }
    .nav-links li.active a {
      color: #F5F0DC;
      border-bottom: 1.5px solid #FF0066;
      padding-bottom: 2px;
    }

    /* Hero */
    .hero {
      padding: 40px 52px 0;
    }
    .hero-headline {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 13.8vw;
      line-height: 0.88;
      letter-spacing: 0.04em;
    }
    .hl-blue {
      color: #4268FF;
      text-shadow:
        8px 4px 0 rgba(255, 0, 102, 0.7),
        -3px -2px 0 rgba(212, 255, 0, 0.25),
        12px 6px 0 rgba(255, 0, 102, 0.15);
    }
    .hl-lime {
      color: #D4FF00;
      text-shadow:
        -7px 5px 0 rgba(0, 56, 255, 0.65),
        4px -3px 0 rgba(255, 0, 102, 0.3),
        -11px 8px 0 rgba(0, 56, 255, 0.12);
    }
    .hl-pink {
      color: #FF0066;
      text-shadow:
        7px -4px 0 rgba(212, 255, 0, 0.65),
        -4px 3px 0 rgba(0, 56, 255, 0.3),
        11px -7px 0 rgba(212, 255, 0, 0.12);
    }
  </style>
</head>
<body>
  <nav>
    <div class="nav-brand">
      <span class="nav-brand-name">BASTILLE</span>
      <span class="nav-brand-sub">Advisory</span>
    </div>
    <ul class="nav-links">
      <li class="active"><a href="#">HOME</a></li>
      <li><a href="#">APPROACH</a></li>
      <li><a href="#">ABOUT</a></li>
      <li><a href="#">WORK</a></li>
      <li><a href="#">CONTACT</a></li>
    </ul>
  </nav>
  <div class="hero">
    <div class="hero-headline">
      <span class="hl-blue">GROWTH.</span><br>
      <span class="hl-lime">NARRATIVE.</span><br>
      <span class="hl-pink">RAISE.</span>
    </div>
  </div>
</body>
</html>
