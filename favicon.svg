<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="5" fill="#0d0d0d"/>
  <defs>
    <linearGradient id="fg" x1="16" y1="30" x2="16" y2="2" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#D4FF00"/>
      <stop offset="100%" stop-color="#00DDFF"/>
    </linearGradient>
  </defs>

  <!--
    Single organic flame silhouette.
    Left-of-center main peak (y=2), notch valley (y=11),
    right secondary peak (y=4), wide rounded base.
    The concave notch between peaks reads as two flame tongues.
  -->
  <path fill="url(#fg)" d="
    M6,30
    C4,24 4,19 5,16
    C6,13 8,9 10,7
    C11,4 12,2 13,2
    C14,2 15,6 15,11
    C17,9 20,5 22,5
    C23,4 24,3 25,5
    C26,8 26,14 26,20
    C27,18 28,17 28,22
    C28,26 26,30 23,30
    C19,30 10,30 6,30
    Z
  "/>
</svg>
